name: Update Trades Briefing

on:
  schedule:
    - cron: "0,30 15-23 * * *"  # 8am–4pm PT (UTC-7)
    - cron: "0,30 0-3 * * *"   # 4pm–8pm PT (UTC-7)
  workflow_dispatch:           # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Anthropic SDK
        run: npm install @anthropic-ai/sdk

      - name: Run briefing update
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/update-briefing.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "trades-briefing-bot"
          git config user.email "bot@trades-briefing.app"
          git add data/briefing.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Briefing update $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
